# cutecumber on Fly.io — single machine, volume-backed SQLite (DECISIONS #33)
app = "cutecumber"
primary_region = "fra"

[env]
  DATABASE = "/data/cutecumber.db"
  # Uploaded avatars on the persistent volume (NOT the ephemeral app dir).
  AVATAR_DIR = "/data/avatars"
  SITE_ORIGIN = "https://cutecumber.cc"
  MAIL_FROM = "cutecumber <hello@cutecumber.cc>"
  TRUST_PROXY = "1"
  COOKIE_SECURE = "1"
  HSTS = "1"
  ROBOTS_ALLOW = "0"   # stealth — flip to "1" on launch day, then `fly deploy`
  # Litestream DB backups (issue #9). Non-secret config; credentials are in
  # fly secrets (LITESTREAM_ACCESS_KEY_ID / LITESTREAM_SECRET_ACCESS_KEY).
  # LITESTREAM_BUCKET being set is what enables replication (entrypoint.sh).
  # EU-jurisdiction R2 bucket -> the `.eu.` endpoint is required.
  LITESTREAM_BUCKET = "cutecumber-litestream"
  LITESTREAM_PATH = "cutecumber"
  LITESTREAM_ENDPOINT = "https://905c8589bb44634314a4c2bb5a809021.eu.r2.cloudflarestorage.com"

[mounts]
  source = "cutecumber_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Always-on: cold starts would eat the LCP < 1s budget. Costs ~$2-3/mo.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/robots.txt"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
