  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>cutecumber · design spec v1<\u002Ftitle>\n<style>\n  @font-face { font-family: 'Fredoka'; src: url(\"fbd01fb9-9916-437a-aeb3-bdc24c3a8e80\") format('woff2'); font-weight: 600; font-display: swap; }\n  @font-face { font-family: 'Comfortaa'; src: url(\"228688ca-49e8-4127-a25d-5e8daa7e6bc2\") format('woff2'); font-weight: 700; font-display: swap; }\n  :root {\n    --ink: #3f3a3d; --green: #3f5a39; --muted: #8a8a93; --hair: #eee3e7;\n    --pink: #e58fb1; --paper: #fffdfb;\n  }\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { background: #f4f0ec; color: var(--ink); font: 15px/1.65 system-ui, -apple-system, sans-serif; }\n  .page { max-width: 820px; margin: 0 auto; padding: 56px 64px 80px; background: var(--paper); }\n  h1, h2 { font-family: 'Fredoka', system-ui, sans-serif; font-weight: 600; color: var(--green); }\n  h1 { font-size: 34px; letter-spacing: -0.5px; }\n  h2 { font-size: 21px; margin: 52px 0 14px; padding-top: 20px; border-top: 1.5px solid var(--hair); }\n  h3 { font-size: 15px; font-weight: 650; margin: 22px 0 8px; }\n  p { margin: 0 0 10px; max-width: 64ch; text-wrap: pretty; }\n  .small { font-size: 13px; color: var(--muted); }\n  code, .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12.5px; }\n  code { background: #f6f1ed; border-radius: 4px; padding: 1px 5px; }\n  pre { background: #f6f1ed; border-radius: 10px; padding: 14px 16px; overflow-x: auto; margin: 10px 0 14px; }\n  pre code { background: none; padding: 0; }\n  table { border-collapse: collapse; width: 100%; margin: 10px 0 14px; font-size: 13.5px; }\n  th { text-align: left; font-weight: 650; padding: 7px 10px; border-bottom: 1.5px solid var(--hair); white-space: nowrap; }\n  td { padding: 7px 10px; border-bottom: 1px solid #f5edf0; vertical-align: middle; }\n  .chip { display: inline-block; width: 15px; height: 15px; border-radius: 5px; border: 1px solid rgba(0,0,0,.08); vertical-align: -3px; margin-right: 7px; }\n  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; margin: 12px 0; }\n  .card { border: 1px solid var(--hair); border-radius: 14px; padding: 16px; background: #fff; }\n  .figcap { font-family: ui-monospace, monospace; font-size: 10.5px; color: var(--muted); margin-top: 8px; }\n  ul { margin: 0 0 12px 18px; }\n  li { margin-bottom: 4px; max-width: 62ch; }\n  .cover { display: flex; align-items: center; gap: 20px; padding: 26px 0 34px; }\n  .dont li { color: #8a5a68; }\n  .tiled { border-radius: 10px; height: 96px; border: 1px solid var(--hair); }\n  .avgrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin: 14px 0; }\n  .avgrid figure { display: flex; flex-direction: column; align-items: center; gap: 5px; }\n  .avgrid img { width: 100%; border-radius: 14px; }\n  .avgrid figcaption { font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); }\n  .packrow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 10px 0 4px; }\n  .packrow figure { display: flex; flex-direction: column; align-items: center; gap: 4px; }\n  .packrow img { width: 100%; border: 1px dashed #e3d5db; border-radius: 8px; background: #fff; }\n  .packrow figcaption { font-family: ui-monospace, monospace; font-size: 9.5px; color: var(--muted); }\n  .wordmark { font-family: 'Fredoka', system-ui, sans-serif; font-weight: 600; font-size: 36px; color: var(--green); letter-spacing: -0.5px; display: inline-flex; align-items: center; gap: 12px; }\n  .wordmark img { height: 48px; }\n  .wm-u { font-family: 'Fredoka', system-ui, sans-serif; font-weight: 600; font-size: 32px; color: var(--green); letter-spacing: -0.5px; }\n  .wm-u img { height: 21px; margin: 0 2px -1px; }\n  @media print {\n    body { background: #fff; }\n    .page { max-width: none; padding: 24px 8px; }\n    h2 { break-after: avoid; }\n    .card, .avgrid, .packrow, pre, table { break-inside: avoid; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<main class=\"page\">\n\n  <header class=\"cover\">\n    <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"the cutecumber slice\" width=\"92\" height=\"92\">\n    <div>\n      <h1>cutecumber — design spec<\u002Fh1>\n      <p class=\"small\">v1 · june 2026 · the cutest little link-in-bio · production files in <code>production/<\u002Fcode><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <p><strong>One face, everywhere.<\u002Fstrong> Dot eyes with a sparkle, a tiny smile, pink blush.\n  The mark, the avatars and the pack friends all share it, so everything on\n  cutecumber feels like one sticker sheet. Soft-web kawaii: rounded, gentle,\n  slightly imperfect beats geometric-perfect.<\u002Fp>\n\n  <h2>01 · the mark — the slice<\u002Fh2>\n  <div class=\"row\">\n    <div class=\"card\" style=\"display:flex; gap:18px; align-items:flex-end; background:#fff5f7;\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"64\" height=\"64\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"48\" height=\"48\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"32\" height=\"32\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"16\" height=\"16\">\n    <\u002Fdiv>\n    <div class=\"card\" style=\"display:flex; gap:18px; align-items:flex-end; background:#232338;\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"64\" height=\"64\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"48\" height=\"48\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"32\" height=\"32\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"16\" height=\"16\">\n    <\u002Fdiv>\n    <div class=\"card\" style=\"background:linear-gradient(160deg,#fff5f7,#ffe2ee); padding:18px;\">\n      <img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\" width=\"56\" height=\"56\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p>A cucumber slice: rind <code>#8fcb72<\u002Fcode>, flesh <code>#ecf7df<\u002Fcode>, six seeds\n  <code>#cde8b4<\u002Fcode>, the kawaii face centered. One circle — which is why it keeps its\n  face legible all the way down to a 16&nbsp;px favicon, where the runner-up mascots turned to mush.<\u002Fp>\n  <ul>\n    <li><strong>Files:<\u002Fstrong> <code>production/brand/logo_slice.svg<\u002Fcode> (mark) and <code>production/brand/favicon.svg<\u002Fcode> (same art) → drop into <code>app/static/favicon.svg<\u002Fcode>.<\u002Fli>\n    <li><strong>Clearspace:<\u002Fstrong> keep one seed-length (¼ of the mark's width) free on all sides.<\u002Fli>\n    <li><strong>Minimum size:<\u002Fstrong> 16 px. Below 24 px the blush may disappear before the eyes do — that's fine, it's baked into the art.<\u002Fli>\n    <li><strong>Spot illustration:<\u002Fstrong> <code>production/brand/mascot_classic.svg<\u002Fcode> — the full-body cucumber. Use for empty states, the 404, onboarding moments. Never as the favicon or app icon.<\u002Fli>\n  <\u002Ful>\n  <h3>don't<\u002Fh3>\n  <ul class=\"dont\">\n    <li>recolor the rind, flesh or face — the slice is always green, even on theme pages<\u002Fli>\n    <li>add moods to the mark (winks and sleepy eyes live in illustrations, not the logo)<\u002Fli>\n    <li>rotate, outline, or put the slice in a container shape — it is already a circle<\u002Fli>\n  <\u002Ful>\n\n  <h2>02 · wordmark<\u002Fh2>\n  <div class=\"row\">\n    <div class=\"card\">\n      <span class=\"wordmark\"><img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"\">cutecumber<\u002Fspan>\n      <p class=\"figcap\">primary · slice + Fredoka 600 lowercase<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <span class=\"wm-u\">c<img src=\"50e9b250-a59b-45d1-8348-b1094e2190ce\" alt=\"u\">tecumber<\u002Fspan>\n      <p class=\"figcap\">playful variant · slice as the u — social headers, stickers, fun spots<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p>The wordmark is live text, not paths — Fredoka 600 is already self-hosted in the repo.\n  Mark height ≈ 1.33× the font size, gap ≈ ⅓ of the font size, color <code>#3f5a39<\u002Fcode>,\n  letter-spacing −0.5&nbsp;px, always lowercase.<\u002Fp>\n<pre><code>&lt;span class=\"wordmark\"&gt;\n  &lt;img src=\"/static/logo_slice.svg\" alt=\"\" height=\"48\"&gt; cutecumber\n&lt;/span&gt;\n.wordmark { font: 600 36px Fredoka, system-ui, sans-serif;\n            color: #3f5a39; letter-spacing: -.5px;\n            display: inline-flex; align-items: center; gap: 12px; }<\u002Fcode><\u002Fpre>\n  <p class=\"small\">Playful variant: same rules, slice height ≈ 0.6× font size, sits on the baseline\n  (<code>margin-bottom: -.04em<\u002Fcode>). Use it where charm beats instant legibility — never in the dash nav.<\u002Fp>\n\n  <h2>03 · color<\u002Fh2>\n  <h3>brand palette (fixed — never themed)<\u002Fh3>\n  <table>\n    <tbody><tr><th>token<\u002Fth><th>hex<\u002Fth><th>used for<\u002Fth><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#8fcb72\"><\u002Fspan>cuke green<\u002Ftd><td class=\"mono\">#8fcb72<\u002Ftd><td>rind, mascot body, brand green<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#6da854\"><\u002Fspan>cuke shade<\u002Ftd><td class=\"mono\">#6da854<\u002Ftd><td>bumps, leaves, stems<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#a9da8d\"><\u002Fspan>cuke light<\u002Ftd><td class=\"mono\">#a9da8d<\u002Ftd><td>leaf highlights, second leaf<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#ecf7df\"><\u002Fspan>flesh<\u002Ftd><td class=\"mono\">#ecf7df<\u002Ftd><td>slice interior<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#cde8b4\"><\u002Fspan>seed<\u002Ftd><td class=\"mono\">#cde8b4<\u002Ftd><td>slice seeds<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#33502e\"><\u002Fspan>face ink<\u002Ftd><td class=\"mono\">#33502e<\u002Ftd><td>eyes + smile on green characters<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#f7b1c8\"><\u002Fspan>blush<\u002Ftd><td class=\"mono\">#f7b1c8<\u002Ftd><td>cheeks, everywhere<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#3f5a39\"><\u002Fspan>wordmark green<\u002Ftd><td class=\"mono\">#3f5a39<\u002Ftd><td>logotype, brand headings<\u002Ftd><\u002Ftr>\n    <tr><td><span class=\"chip\" style=\"background:#e58fb1\"><\u002Fspan>brand accent<\u002Ftd><td class=\"mono\">#e58fb1<\u002Ftd><td>CTAs on cutecumber's own pages (= strawberry_milk accent)<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <p class=\"small\">User pages keep their own theming engine (<code>theme.py<\u002Fcode> presets +\n  overrides, WCAG AA enforced by tests). Nothing in this spec touches those tokens; characters and\n  pack art are <code>full_color<\u002Fcode> and were tuned to read on every preset, including\n  midnight snack — without halo outlines.<\u002Fp>\n\n  <h2>04 · type<\u002Fh2>\n  <table>\n    <tbody><tr><th>role<\u002Fth><th>face<\u002Fth><th>notes<\u002Fth><\u002Ftr>\n    <tr><td>display / brand<\u002Ftd><td>Fredoka 600<\u002Ftd><td>headings, wordmark, avatar names · self-hosted woff2, latin subset<\u002Ftd><\u002Ftr>\n    <tr><td>display alt<\u002Ftd><td>Comfortaa 700<\u002Ftd><td>only as a user-selectable page font — not for brand surfaces<\u002Ftd><\u002Ftr>\n    <tr><td>body, UI<\u002Ftd><td>system stack<\u002Ftd><td><code>system-ui, -apple-system, sans-serif<\u002Fcode> · keeps pages ~2 KB<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <p class=\"small\">Rule from the repo stands: at most one display font loads per page, h1 only.<\u002Fp>\n\n  <h2>05 · the face system<\u002Fh2>\n  <ul>\n    <li><strong>Eyes:<\u002Fstrong> two dots, r ≈ 2 units on a 64 grid, 11 units apart, each with a 0.7 white sparkle at upper-left.<\u002Fli>\n    <li><strong>Smile:<\u002Fstrong> a single quadratic curve, ~6.5 units wide, stroke 1.7, round caps. No open mouths except boo (ghosts get an \"oo\" mouth).<\u002Fli>\n    <li><strong>Blush:<\u002Fstrong> always. Two ellipses just outside the eyes, ~75% opacity. Pink <code>#f7b1c8<\u002Fcode> by default; warm characters may shift it warmer.<\u002Fli>\n    <li><strong>Moods:<\u002Fstrong> happy (default), sleepy (closed arcs — moonbeam), wink (illustrations only). Nothing else — no angry, no crying. cutecumber is never sad.<\u002Fli>\n    <li><strong>Ink color<\u002Fstrong> adapts to the body so contrast stays soft but readable (green chars use <code>#33502e<\u002Fcode>, berry uses <code>#7c2940<\u002Fcode>, etc. — see the avatar SVGs for the canonical pairs).<\u002Fli>\n  <\u002Ful>\n\n  <h2>06 · avatar set<\u002Fh2>\n  <p>Twelve original friends replace the emoji grid and the flat gradients. One motif per square\n  tile, rounded-square crop — <strong>not<\u002Fstrong> circle-cropped (only uploaded photos are circles;\n  the shape difference is how you tell them apart at a glance).<\u002Fp>\n  <div class=\"avgrid\">\n    <figure><img src=\"f6970853-3d36-4396-8c3b-e31c8daf1d19\" alt=\"\"><figcaption>sprout<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"d8e71395-e58e-4b76-b4d7-7c4d6549be67\" alt=\"\"><figcaption>froggy<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"e1c8a0bf-f818-4617-a0c8-9eca7eb1a4f9\" alt=\"\"><figcaption>bun<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"f4f5b21c-757d-4409-a297-3e579d75f8b6\" alt=\"\"><figcaption>boo<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"11f533d6-c5b5-4e23-bfcd-e6efdb593929\" alt=\"\"><figcaption>berry<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"cfce4dbd-4bde-4f19-a109-b2edf864ba62\" alt=\"\"><figcaption>shroom<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"b6a40e13-4fd5-4365-9edd-c66334ad8510\" alt=\"\"><figcaption>matcha<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"78f160e9-b8b2-4213-add4-5ad9a3c0da04\" alt=\"\"><figcaption>moonbeam<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"62b5a7bc-996a-4d8b-bfe5-569bc271b206\" alt=\"\"><figcaption>blossom<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"6636ceb6-8250-4feb-8ddb-4bc58e3ccf19\" alt=\"\"><figcaption>whiskers<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"12c9b825-d526-4170-bc41-f5af0dc594a2\" alt=\"\"><figcaption>riceball<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"dfdfd92e-7565-411b-aae2-eca6905a00fd\" alt=\"\"><figcaption>twinkle<\u002Ffigcaption><\u002Ffigure>\n  <\u002Fdiv>\n  <ul>\n    <li><strong>Default avatar:<\u002Fstrong> sprout (replaces <code>DEFAULT_AVATAR_EMOJI = \"🥒\"<\u002Fcode>).<\u002Fli>\n    <li><strong>Rendering:<\u002Fstrong> 88 px on public pages, border-radius 25% (16/64), soft drop shadow optional. Picker swatches 48 px, selection ring = page accent.<\u002Fli>\n    <li><strong>Token shape:<\u002Fstrong> <code>avatar = \"set:sprout\"<\u002Fcode> alongside the existing <code>image:<\u002Fcode> kind — validated against the registry at save and render, exactly like everything else.<\u002Fli>\n    <li>moonbeam carries its own dark tile — it is the one avatar that doesn't sit on a pastel.<\u002Fli>\n  <\u002Ful>\n\n  <h2>07 · decoration packs<\u002Fh2>\n  <p>Four launch packs, built to <code>DESIGN_PACKS.md<\u002Fcode>: 130×130 tiles, all under 2 KB\n  (budget 8 KB), <code>full_color<\u002Fcode>, no scripts, no rasters. Each <em>decoration<\u002Fem> is one\n  motif scattered twice (large + small echo) so it already tiles nicely alone.<\u002Fp>\n\n  <h3>garden patch 🥒 — the house pack<\u002Fh3>\n  <div class=\"packrow\">\n    <figure><img src=\"c757e8c0-b23f-41a3-bada-cd0f80d0799c\" alt=\"\"><figcaption>baby_cuke<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"6dc1329d-9457-4283-926b-4fef460ec056\" alt=\"\"><figcaption>sprout<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"a2d7c81e-8e81-4a5b-8a65-7002a0935a3e\" alt=\"\"><figcaption>leaf<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"0ffcd265-5088-4e54-aee4-7bd1310a49a6\" alt=\"\"><figcaption>daisy<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"a424e254-89ac-41f9-885c-2bb46c831f02\" alt=\"\"><figcaption>ladybug<\u002Ffigcaption><\u002Ffigure>\n  <\u002Fdiv>\n  <h3>sakura dreams 🌸<\u002Fh3>\n  <div class=\"packrow\">\n    <figure><img src=\"bb2f8312-a13a-400c-bc29-0ca9502ff858\" alt=\"\"><figcaption>blossom<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"98511781-c59d-43fa-8b44-74c24d6a6b30\" alt=\"\"><figcaption>petal<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"a6d014e3-5c3c-41c9-b30d-dc8ff4c5ac8f\" alt=\"\"><figcaption>bow<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"769aada8-6a26-4ee5-8f64-39074168b2ff\" alt=\"\"><figcaption>cloud<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"a52d9b54-36f4-4274-929a-d2852b77cf80\" alt=\"\"><figcaption>sparkle<\u002Ffigcaption><\u002Ffigure>\n  <\u002Fdiv>\n  <h3>cozy café 🍓<\u002Fh3>\n  <div class=\"packrow\">\n    <figure><img src=\"cc067602-efaf-4d50-8a25-8b97d4f7b82b\" alt=\"\"><figcaption>matcha_cup<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"f0e05c38-9903-4e06-894d-a059fc87c83c\" alt=\"\"><figcaption>strawberry<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"314f4c84-8854-4ae9-a968-5d6a21c21642\" alt=\"\"><figcaption>cookie<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"1bf4c70d-eeea-4df5-a4be-63f8ecd7c19f\" alt=\"\"><figcaption>cake<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"b26e893d-4c47-4377-9830-81112e460820\" alt=\"\"><figcaption>heart<\u002Ffigcaption><\u002Ffigure>\n  <\u002Fdiv>\n  <h3>little friends 🐸<\u002Fh3>\n  <div class=\"packrow\">\n    <figure><img src=\"1dd20850-c64f-48ce-a622-e0e3e1f3335d\" alt=\"\"><figcaption>froggy<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"92d3f656-f3ce-494c-a1c1-1689b50db5eb\" alt=\"\"><figcaption>boo<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"018c9572-1214-49d9-a0fc-91a05ebf7e90\" alt=\"\"><figcaption>bun<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"7db67ef5-8bf9-4229-bd95-8242d2bd8188\" alt=\"\"><figcaption>shroom<\u002Ffigcaption><\u002Ffigure>\n    <figure><img src=\"149ccc71-7264-4523-9a5c-027f48dc38b1\" alt=\"\"><figcaption>twinkle<\u002Ffigcaption><\u002Ffigure>\n  <\u002Fdiv>\n\n  <h3>tiled, stacked<\u002Fh3>\n  <div class=\"row\">\n    <div class=\"tiled\" style=\"flex:1; min-width:220px; background:#fff5f7 url(&quot;c757e8c0-b23f-41a3-bada-cd0f80d0799c&quot;);\"><\u002Fdiv>\n    <div class=\"tiled\" style=\"flex:1; min-width:220px; background:#fff5f7 url(&quot;c757e8c0-b23f-41a3-bada-cd0f80d0799c&quot;), #fff5f7 url(&quot;6dc1329d-9457-4283-926b-4fef460ec056&quot;); background-image:url(&quot;c757e8c0-b23f-41a3-bada-cd0f80d0799c&quot;),url(&quot;6dc1329d-9457-4283-926b-4fef460ec056&quot;),url(&quot;a2d7c81e-8e81-4a5b-8a65-7002a0935a3e&quot;);\"><\u002Fdiv>\n    <div class=\"tiled\" style=\"flex:1; min-width:220px; background-color:#232338; background-image:url(&quot;c757e8c0-b23f-41a3-bada-cd0f80d0799c&quot;),url(&quot;6dc1329d-9457-4283-926b-4fef460ec056&quot;),url(&quot;a2d7c81e-8e81-4a5b-8a65-7002a0935a3e&quot;);\"><\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"figcap\">one decoration · three stacked · the same three on midnight snack<\u002Fp>\n  <ul>\n    <li><strong>Mix &amp; match:<\u002Fstrong> the five decorations of a pack use disjoint scatter slots, so any subset stacks without collisions. Users compose their background by picking decorations; <code>theme.json<\u002Fcode> stores a list of slugs instead of one: <code>\"decoration\": [\"baby_cuke\", \"daisy\"]<\u002Fcode> — rendered as stacked CSS background layers, validated against the pack registry exactly like today.<\u002Fli>\n    <li><strong>Density rule:<\u002Fstrong> default suggestion is 2–3 decorations; the picker should gently cap at 5. All art ships at 80% opacity baked in — wallpaper, never competition.<\u002Fli>\n    <li><strong>The old shapes<\u002Fstrong> (sparkles/hearts/stars in <code>theme.py<\u002Fcode>) map to <code>sakura_dreams/sparkle<\u002Fcode>, <code>cozy_cafe/heart<\u002Fcode>, <code>little_friends/twinkle<\u002Fcode> for migration.<\u002Fli>\n  <\u002Ful>\n\n  <h2>08 · file manifest &amp; integration notes<\u002Fh2>\n<pre><code>production/\n├── brand/\n│   ├── logo_slice.svg        → the mark; also app/static/logo_slice.svg\n│   ├── favicon.svg           → replaces app/static/favicon.svg\n│   └── mascot_classic.svg    → spot illustration (404, empty states)\n├── avatars/                  → 12 files, token = \"set:&lt;name&gt;\"\n└── packs/                    → 4 packs, per DESIGN_PACKS.md\n    └── &lt;pack&gt;/pack.json + 5 decoration tiles each<\u002Fcode><\u002Fpre>\n  <ul>\n    <li><code>constants.py<\u002Fcode>: replace <code>AVATAR_EMOJI<\u002Fcode> with the avatar-set registry; default becomes <code>set:sprout<\u002Fcode>. Emoji avatars retire (existing rows fall back to default at render, per the tolerant-render rule).<\u002Fli>\n    <li><code>theme.py<\u002Fcode>: <code>decoration<\u002Fcode> enum → pack registry lookup; value becomes a validated list of <code>pack/slug<\u002Fcode> pairs rendered as stacked background layers.<\u002Fli>\n    <li>Templates: swap 🥒 for the inline slice in <code>index.html<\u002Fcode> (hero + title), <code>public_page.html<\u002Fcode> footer, and the og/site icons. The footer mark renders at 15 px inline.<\u002Fli>\n    <li>Tiles are static files — they can ship in <code>app/static/packs/<\u002Fcode> and inherit the existing CSP and caching story. No new endpoints.<\u002Fli>\n  <\u002Ful>\n\n  <p class=\"small\" style=\"margin-top:40px;\">cutecumber design spec v1 · drawn with one face, everywhere 🥒<\u002Fp>\n<\u002Fmain>\n\n\n<\u002Fbody><\u002Fhtml>"
