{% extends "dash_base.html" %}
{% block title %}log in{% endblock %}
{% block content %}
<section class="card">
  <h1>welcome back 🌼</h1>
  <form method="post" action="{{ url_for('auth.login') }}" class="stack">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label for="email">email</label>
    <input id="email" name="email" type="email" required maxlength="254"
           autocomplete="email" placeholder="you@example.com">
    <label for="password">password</label>
    <input id="password" name="password" type="password" required
           maxlength="72" autocomplete="current-password" placeholder="your password">
    <button type="submit">log in</button>
  </form>
  <p class="hint">new here? <a href="{{ url_for('auth.signup') }}">sign up</a> — it takes a minute 💕</p>
</section>
{% endblock %}
