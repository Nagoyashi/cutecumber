{% extends "auth_base.html" %}
{% block title %}log in{% endblock %}
{% block content %}
<section class="card auth-card">
  <h1>welcome back 🌼</h1>
  <form method="post" action="{{ url_for('auth.login') }}" class="stack">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label for="identifier">email or username</label>
    <input id="identifier" name="identifier" type="text" required maxlength="254"
           autocapitalize="off" spellcheck="false"
           autocomplete="username" placeholder="you@example.com or yourname">
    <label for="password">password</label>
    <div class="pw-field">
      <input id="password" name="password" type="password" required
             maxlength="72" autocomplete="current-password" placeholder="your password">
      <button type="button" class="pw-toggle" aria-controls="password" aria-pressed="false" hidden>show</button>
    </div>
    <button type="submit">log in</button>
  </form>
  <p class="hint">new here? <a href="{{ url_for('auth.signup') }}">sign up</a> — it takes a minute 💕</p>
  <p class="hint">forgot your password? <a href="{{ url_for('auth.reset_request') }}">reset it 🌱</a></p>
</section>
{% endblock %}
