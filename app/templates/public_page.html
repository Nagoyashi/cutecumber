<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} · cutecumber.cc</title>
<meta name="description" content="{{ description }}">
<link rel="canonical" href="{{ canonical }}">
<meta property="og:title" content="{{ title }}">
<meta property="og:description" content="{{ description }}">
<meta property="og:url" content="{{ canonical }}">
<meta property="og:type" content="profile">
<meta property="og:site_name" content="cutecumber.cc">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#fff5f7">
<style nonce="{{ csp_nonce }}">
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px;
font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#3c3c43;line-height:1.5;
background:linear-gradient(160deg,#fff5f7 0%,#f3f9f4 100%)}
main{width:100%;max-width:420px;text-align:center}
.avatar{font-size:56px;line-height:1}
{% if gradient %}.avatar-g{width:88px;height:88px;border-radius:50%;margin:0 auto;
background:linear-gradient(135deg,{{ gradient[0] }},{{ gradient[1] }})}
{% endif %}h1{margin-top:12px;font-size:1.5rem;font-weight:700;overflow-wrap:break-word}
.pronouns{margin-top:2px;color:#8a8a93;font-size:.9rem}
.bio{margin-top:10px;overflow-wrap:break-word;white-space:pre-line}
.empty{margin-top:28px;color:#8a8a93;font-size:.95rem}
footer{margin-top:44px;font-size:.8rem}
footer a{color:#8a8a93;text-decoration:none}
footer a:hover,footer a:focus-visible{color:#3c3c43}
</style>
</head>
<body>
<main>
  {% if gradient %}<div class="avatar avatar-g" aria-hidden="true"></div>
  {% else %}<div class="avatar" aria-hidden="true">{{ avatar_emoji }}</div>
  {% endif %}<h1>{{ title }}</h1>
  {% if user.pronouns %}<p class="pronouns">{{ user.pronouns }}</p>{% endif %}
  {% if user.bio %}<p class="bio">{{ user.bio }}</p>{% endif %}
  <p class="empty">no links here yet — check back soon ✨</p>
  <footer><a href="/">made with cutecumber 🥒</a></footer>
</main>
</body>
</html>
