<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}cutecumber{% endblock %} · cutecumber.cc</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="{{ url_for('static', filename='dash.css') }}">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ url_for('public.index') }}">🥒 cutecumber</a>
  <nav class="topnav">
    {% if g.user %}
      <form method="post" action="{{ url_for('auth.logout') }}">
        <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
        <button class="linkish" type="submit">log out</button>
      </form>
    {% else %}
      <a href="{{ url_for('auth.login') }}">log in</a>
      <a href="{{ url_for('auth.signup') }}">sign up</a>
    {% endif %}
  </nav>
</header>
<main class="wrap">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <p class="flash flash-{{ category }}">{{ message }}</p>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
