name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches the Dockerfile
          cache: pip               # reuse the pip download cache between runs
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest -v
      - name: Audit dependencies for known vulnerabilities
        # Blocking: a known CVE in our declared deps fails this required `test`
        # check and blocks merge to main (issue #7). pipx runs pip-audit in an
        # isolated env so the tool's own deps don't pollute the audit. Waive an
        # advisory with no upstream fix yet via `--ignore-vuln GHSA-xxxx` here
        # until it's patched, rather than disabling the gate.
        run: pipx run pip-audit -r requirements.txt
